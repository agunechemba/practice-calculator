<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: red;
      font-family: Arial, sans-serif;
    }

    .calculator {
      background: blue;
      padding: 20px;
      border-radius: 10px;
      width: 260px;
    }

    .display {
      width: 100%;
      height: 50px;
      background: #000;
      color: #fff;
      font-size: 24px;
      text-align: right;
      padding: 10px;
      box-sizing: border-box;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 50px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .number {
      background: #3e3e55;
      color: white;
    }

    .operator {
      background: green;
      color: white;
    }

    .clear {
      background: #e63946;
      color: white;
    }

    .equal {
      background: #2ec4b6;
      color: black;
    }

    .span-2 {
      grid-column: span 2;
    }
  </style>
</head>
<body>

<div class="calculator">
  <div id="display" class="display">0</div>

  <div class="buttons">
    <!-- Top row -->
    <button class="clear span-2" onclick="clearDisplay()">Clear</button>
    <button class="operator" onclick="deleteLast()">DEL</button>
    <button class="operator" onclick="append('/')">÷</button>

    <!-- Numbers -->
    <button class="number" onclick="append('7')">7</button>
    <button class="number" onclick="append('8')">8</button>
    <button class="number" onclick="append('9')">9</button>
    <button class="operator" onclick="append('*')">×</button>

    <button class="number" onclick="append('4')">4</button>
    <button class="number" onclick="append('5')">5</button>
    <button class="number" onclick="append('6')">6</button>
    <button class="operator" onclick="append('-')">−</button>

    <button class="number" onclick="append('1')">1</button>
    <button class="number" onclick="append('2')">2</button>
    <button class="number" onclick="append('3')">3</button>
    <button class="operator" onclick="append('+')">+</button>

    <!-- Bottom row -->
    <button class="number span-2" onclick="append('0')">0</button>
    <button class="number" onclick="append('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>
<script>
  const display = document.getElementById("display");

  function append(value) {
    display.innerText = display.innerText === "0" ? value : display.innerText + value;
  }

  function clearDisplay() {
    display.innerText = "0";
  }

  function deleteLast() {
    display.innerText =
      display.innerText.length > 1 ? display.innerText.slice(0, -1) : "0";
  }

  function calculate() {
    try {
      display.innerText = eval(display.innerText);
    } catch {
      display.innerText = "Error";
    }
  }
</script>


</body>
</html>
